# Disclude — Source Code Obfuscation Scan
#
# Detects obfuscation techniques used to make malicious code look benign:
# Supports: C, Rust, Python, TypeScript, JavaScript, Bash/Shell
# Docs: https://github.com/disclude-io/disclude-rs
#
# ── Usage ────────────────────────────────────────────────────────────────────
#
#   Basic:
#
#   jobs:
#     disclude:
#       uses: disclude-io/.github/.github/workflows/disclude-scan.yml@main
#       permissions:
#         actions: read
#         contents: read
#         security-events: write
#
#   With LLM review (demotes false positives before upload):
#
#   jobs:
#     disclude:
#       uses: disclude-io/.github/.github/workflows/disclude-scan.yml@main
#       secrets: inherit        # passes ANTHROPIC_API_KEY (or OPENAI_API_KEY / OLLAMA_API_KEY)
#       with:
#         llm: true
#       permissions:
#         actions: read
#         contents: read
#         security-events: write
#
# ── Inputs ───────────────────────────────────────────────────────────────────
#
#   path            Directory to scan (default: '.')
#   severity        Minimum severity to report: info | warn | critical (default: warn)
#   version         Disclude version to install (default: latest)
#   diff            Git ref to compare against — only report findings introduced
#                   since that ref, e.g. 'main' or a tag. Omit for a full scan.
#   extra-args      Any additional flags to pass to `disclude scan`, e.g.
#                   '--no-ast'
#   fail-on-findings  Exit the job with a failure if any findings are reported.
#                   Useful for blocking PRs. (default: false)
#
#   llm             Enable LLM-assisted review of findings. The LLM re-evaluates
#                   each finding and demotes false positives to info severity before
#                   the SARIF is uploaded. (default: false)
#   llm-provider    Provider to use: anthropic | openai | ollama.
#                   Auto-detected from whichever API key secret is present
#                   (checked in that order). Default provider is Anthropic.
#   llm-model       Model to use. Defaults per provider:
#                     anthropic → claude-haiku-4-5
#                     openai    → gpt-4o-mini
#                     ollama    → llama3.2
#   llm-base-url    Override the provider's API base URL (useful for self-hosted
#                   Ollama or an OpenAI-compatible proxy).
#
# ── Secrets ──────────────────────────────────────────────────────────────────
#
#   ANTHROPIC_API_KEY   Required when using the Anthropic provider.
#   OPENAI_API_KEY      Required when using the OpenAI provider.
#   OLLAMA_API_KEY      Required when using the Ollama provider.
#
#   Pass secrets to this workflow via `secrets: inherit` in the calling job,
#   or map them explicitly. Only the secret for the selected provider needs to
#   be present. Example:
#
#   jobs:
#     disclude:
#       uses: disclude-io/.github/.github/workflows/disclude-scan.yml@main
#       secrets: inherit
#       with:
#         llm: true
#       permissions:
#         actions: read
#         contents: read
#         security-events: write
#
# Note: the `permissions` block must be set in the CALLER workflow, not here,
# because GitHub evaluates permissions in the caller's context.

name: Disclude Obfuscation Scan

on:
  workflow_call:
    inputs:
      path:
        description: 'Directory to scan'
        default: '.'
        required: false
        type: string
      severity:
        description: 'Minimum severity to report: info, warn, or critical'
        default: 'warn'
        required: false
        type: string
      version:
        description: 'Disclude version to install (e.g. "1.2.0" or "latest")'
        default: 'latest'
        required: false
        type: string
      diff:
        description: 'Git ref to diff against — only report findings introduced since this ref'
        default: ''
        required: false
        type: string
      extra-args:
        description: 'Additional flags passed verbatim to `disclude scan`'
        default: ''
        required: false
        type: string
      fail-on-findings:
        description: 'Fail the job if any findings are reported at or above the severity threshold'
        default: false
        required: false
        type: boolean
      llm:
        description: 'Enable LLM-assisted review — demotes false positives before upload'
        default: false
        required: false
        type: boolean
      llm-provider:
        description: 'LLM provider: anthropic, openai, or ollama (auto-detected from env if omitted)'
        default: ''
        required: false
        type: string
      llm-model:
        description: 'Override the default model for the selected provider'
        default: ''
        required: false
        type: string
      llm-base-url:
        description: 'Override the API base URL (e.g. for a self-hosted Ollama endpoint)'
        default: ''
        required: false
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        description: 'Anthropic API key — required when using the Anthropic provider'
        required: false
      OPENAI_API_KEY:
        description: 'OpenAI API key — required when using the OpenAI provider'
        required: false
      OLLAMA_API_KEY:
        description: 'Ollama API key — required when using the Ollama provider'
        required: false

jobs:
  disclude:
    name: Disclude Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history is required when using --diff against a git ref.
          fetch-depth: ${{ inputs.diff != '' && 0 || 1 }}

      - name: Install Disclude
        run: |
          if [ "${{ inputs.version }}" = "latest" ]; then
            pip install --quiet disclude
          else
            pip install --quiet "disclude==${{ inputs.version }}"
          fi

      - name: Run Disclude scan
        id: scan
        # continue-on-error lets the upload step always run even when findings
        # are present; the optional fail-on-findings gate is applied after.
        env:
          SCAN_PATH: ${{ inputs.path }}
          SCAN_SEVERITY: ${{ inputs.severity }}
          SCAN_DIFF: ${{ inputs.diff }}
          SCAN_EXTRA: ${{ inputs.extra-args }}
          LLM_ENABLED: ${{ inputs.llm }}
          LLM_PROVIDER: ${{ inputs.llm-provider }}
          LLM_MODEL: ${{ inputs.llm-model }}
          LLM_BASE_URL: ${{ inputs.llm-base-url }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          diff_flag=
          [ -n "$SCAN_DIFF" ] && diff_flag="--diff $SCAN_DIFF"
          llm_flags=
          if [ "$LLM_ENABLED" = "true" ]; then
            llm_flags="--llm"
            [ -n "$LLM_PROVIDER" ] && llm_flags="$llm_flags --llm-provider $LLM_PROVIDER"
            [ -n "$LLM_MODEL" ]    && llm_flags="$llm_flags --llm-model $LLM_MODEL"
            [ -n "$LLM_BASE_URL" ] && llm_flags="$llm_flags --llm-base-url $LLM_BASE_URL"
          fi
          disclude scan "$SCAN_PATH" \
            --format sarif \
            --severity "$SCAN_SEVERITY" \
            $diff_flag \
            $llm_flags \
            $SCAN_EXTRA \
            > disclude-results.sarif
        continue-on-error: true

      - name: Inspect SARIF
        run: |
          echo "=== file size ==="
          wc -c disclude-results.sarif
          echo "=== findings ==="
          python3 - <<'EOF'
          import json, os, sys
          EMPTY_SARIF = {"version": "2.1.0", "runs": [{"tool": {"driver": {"name": "disclude", "rules": []}}, "results": []}]}
          if os.path.getsize("disclude-results.sarif") == 0:
              print("0 finding(s)")
              json.dump(EMPTY_SARIF, open("disclude-results.sarif", "w"))
              sys.exit(0)
          try:
              data = json.load(open("disclude-results.sarif"))
          except Exception as e:
              print(f"SARIF parse error: {e}")
              sys.exit(1)
          total = sum(len(r.get("results", [])) for r in data.get("runs", []))
          print(f"{total} finding(s) across {len(data.get('runs', []))} run(s)")
          for run in data.get("runs", []):
              for result in run.get("results", []):
                  loc = result.get("locations", [{}])[0]
                  uri = loc.get("physicalLocation", {}).get("artifactLocation", {}).get("uri", "?")
                  line = loc.get("physicalLocation", {}).get("region", {}).get("startLine", "?")
                  print(f"  {result.get('ruleId', '?')}  {uri}:{line}  {result.get('message', {}).get('text', '')[:80]}")
          EOF

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: disclude-results.sarif
          # Unique category label; visible in the Security → Code scanning tab.
          category: disclude

      - name: Fail if findings reported
        # Only applied when the caller opts in. Runs after the upload so that
        # results appear in the Security tab regardless of job outcome.
        if: ${{ inputs.fail-on-findings }}
        run: |
          count=$(python3 - <<'EOF'
          import json, sys
          data = json.load(open("disclude-results.sarif"))
          total = sum(len(run.get("results", [])) for run in data.get("runs", []))
          print(total)
          EOF
          )
          if [ "$count" -gt 0 ]; then
            echo "::error::Disclude found $count finding(s). Review the Security → Code scanning tab."
            exit 1
          fi
          echo "No findings at severity '${{ inputs.severity }}' or above."